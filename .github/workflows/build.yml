# Buildozer Configuration
# This section defines the buildozer commands for the configuration options.

buildozer set title=MyApp buildozer.spec
buildozer set package.name=myapp buildozer.spec
buildozer set package.domain=com.example buildozer.spec
buildozer set source.dir=./source buildozer.spec
buildozer set source.include_exts=py,png,jpg,kv,atlas buildozer.spec
buildozer set version=1.0 buildozer.spec
buildozer set requirements=python3,kivy buildozer.spec
buildozer set orientation=portrait buildozer.spec
buildozer set fullscreen=0 buildozer.spec
buildozer set log_level=2 buildozer.spec
buildozer set android.api=28 buildozer.spec
buildozer set android.minapi=21 buildozer.spec
buildozer set android.ndk=20.0.0 buildozer.spec
buildozer set android.sdk=28 buildozer.spec
buildozer set android.entrypoint=org.kivy.android.PythonActivity buildozer.spec
buildozer set android.arch=armeabi-v7a buildozer.spec
buildozer set android.allow_backup=1 buildozer.spec
buildozer set android.permissions=INTERNET,WRITE_EXTERNAL_STORAGE buildozer.spec
buildozer set android.features=android.hardware.location.buildozer.spec
buildozer set android.service=ServiceName buildozer.spec
buildozer set android.accept_sdk_license=1 buildozer.spec
buildozer set p4a.branch=develop buildozer.spec
buildozer set android.skip_update=1 buildozer.spec
