name: Build Multi‑Platform Executables & APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:   # Allow manual trigger

jobs:
  # ------------------------------------------------------------
  # DESKTOP BUILDS (Windows, macOS, Linux) via PyInstaller
  # ------------------------------------------------------------
  build-desktop:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: app-windows
            executable_name: app.exe
            pyinstaller_extra: ""
          - os: macos-latest
            artifact_name: app-macos
            executable_name: app
            pyinstaller_extra: ""
          - os: ubuntu-latest
            artifact_name: app-linux
            executable_name: app
            pyinstaller_extra: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # Compatible with most packages

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-dev libgl1-mesa-glx libglib2.0-0

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name ${{ matrix.executable_name }} main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable_name }}

  # ------------------------------------------------------------
  # ANDROID BUILD (APK) via Buildozer
  # ------------------------------------------------------------
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk
          pip install buildozer cython

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: bin/*.apk

  # ------------------------------------------------------------
  # RELEASE (only on tag push)
  # ------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-windows/*.exe
            artifacts/app-macos/app
            artifacts/app-linux/app
            artifacts/app-android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
