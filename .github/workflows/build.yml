build-android:
  name: Build Android APK
  runs-on: ubuntu-latest
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          libltdl-dev
        pip install buildozer "cython<3.0"

    - name: Initialize Buildozer spec if missing
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        if ! grep -q "android.accept_sdk_license" buildozer.spec; then
          echo "android.accept_sdk_license = True" >> buildozer.spec
        else
          sed -i 's/^android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
        fi
        sed -i 's/^requirements = .*/requirements = python3,kivy,pyjnius,requests,cryptography,Pillow,android,psutil,opencv-python,numpy,schedule,PySocks,python-telegram-bot,cython<3.0/' buildozer.spec
        if ! grep -q "android.api" buildozer.spec; then
          echo "android.api = 33" >> buildozer.spec
        fi
        if ! grep -q "android.ndk" buildozer.spec; then
          echo "android.ndk = 25b" >> buildozer.spec
        fi

    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        echo "sdkman.auto.accept.licenses=true" > ~/.android/repositories.cfg

    - name: Build APK with Buildozer
      run: |
        buildozer android debug --verbose 2>&1 | tee buildozer.log

    - name: Upload Buildozer log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-debug-log
        path: buildozer.log

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-android
        path: bin/*.apk
